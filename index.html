<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>資料結構 Final project — 主題測驗網站</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
/* ============================================
   資料結構主題測驗網站 — 極簡終端機風格
   ============================================ */

:root {
  --bg: #0a0a0a;
  --bg-elev: #121212;
  --bg-elev-2: #1a1a1a;
  --bg-elev-3: #222;
  --border: #262626;
  --border-strong: #3a3a3a;
  --text: #fafafa;
  --text-muted: #a3a3a3;
  --text-dim: #737373;
  --text-faint: #525252;
  --green: #4ade80;
  --green-bg: rgba(74, 222, 128, 0.08);
  --green-border: rgba(74, 222, 128, 0.35);
  --red: #f87171;
  --red-bg: rgba(248, 113, 113, 0.08);
  --red-border: rgba(248, 113, 113, 0.35);
  --amber: #fbbf24;
  --amber-bg: rgba(251, 191, 36, 0.08);
  --cyan: #67e8f9;

  --font-sans: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Monaco, Consolas, "Courier New", monospace;

  --radius: 4px;
  --radius-lg: 8px;

  --container: 1100px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: 0.01em;
}

body {
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 0%, rgba(103, 232, 249, 0.04), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(251, 191, 36, 0.03), transparent 50%);
  background-attachment: fixed;
}

::selection { background: rgba(103, 232, 249, 0.25); color: var(--text); }

a { color: inherit; text-decoration: none; }

.mono { font-family: var(--font-mono); letter-spacing: 0; }
.muted { color: var(--text-muted); }
.dim { color: var(--text-dim); }
.faint { color: var(--text-faint); }
.green { color: var(--green); }
.red { color: var(--red); }
.amber { color: var(--amber); }
.cyan { color: var(--cyan); }

/* ============ Layout ============ */

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 32px;
  width: 100%;
}

/* ============ Header ============ */

.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  max-width: var(--container);
  margin: 0 auto;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
}

.brand-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.brand-name { color: var(--text); }
.brand-slash { color: var(--text-dim); }
.brand-path { color: var(--cyan); }

.nav {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}

.nav-link {
  padding: 6px 12px;
  color: var(--text-muted);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.nav-link:hover {
  color: var(--text);
  background: var(--bg-elev);
}

.nav-link.active {
  color: var(--text);
  background: var(--bg-elev-2);
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
}

/* ============ Main ============ */

main {
  flex: 1;
  padding: 48px 0 96px;
}

/* ============ Cursor ============ */

.cursor {
  display: inline-block;
  width: 0.55em;
  height: 1em;
  background: var(--text);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 1.1s steps(1) infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ============ Buttons ============ */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border-strong);
  background: var(--bg-elev);
  color: var(--text);
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s ease;
  letter-spacing: 0;
}

.btn:hover:not(:disabled) {
  background: var(--bg-elev-2);
  border-color: var(--text-dim);
}

.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  font-weight: 600;
}

.btn-primary:hover:not(:disabled) {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  filter: brightness(0.92);
}

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
}

.btn-ghost:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--border-strong);
}

.btn-lg { padding: 14px 24px; font-size: 14px; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ============ Card / Panel ============ */

.panel {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg-elev-2);
}

.panel-body { padding: 24px; }

.win-dots { display: inline-flex; gap: 6px; }
.win-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg-elev-3); }

/* ============ Inputs ============ */

.input {
  width: 100%;
  padding: 9px 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.15s ease;
}

.input:focus { border-color: var(--text-dim); }

/* ============ Code / Pre ============ */

.code-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.65;
}

.kbd {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border-strong);
  border-bottom-width: 2px;
  border-radius: 3px;
  color: var(--text-muted);
}

/* ============ Badges / Tags ============ */

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

.tag-green { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.tag-red { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.tag-amber { background: var(--amber-bg); border-color: rgba(251, 191, 36, 0.35); color: var(--amber); }

/* ============ Hero ============ */

.hero {
  padding: 40px 0 64px;
}

.hero-prompt {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 18px;
  letter-spacing: 0.02em;
}

.hero-title {
  font-size: 56px;
  font-weight: 700;
  margin: 0 0 18px;
  line-height: 1.05;
  letter-spacing: -0.02em;
}

.hero-sub {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 580px;
  margin: 0;
}

/* ============ Stats Strip ============ */

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  overflow: hidden;
}

.stat {
  padding: 20px 22px;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }

.stat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.stat-value .unit {
  font-size: 14px;
  color: var(--text-dim);
  margin-left: 4px;
  font-weight: 400;
}

/* ============ Section heading ============ */

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 56px 0 20px;
}

.section-title {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin: 0;
  text-transform: uppercase;
}

.section-title::before {
  content: "// ";
  color: var(--text-faint);
}

.section-meta {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
}

/* ============ Chapter list ============ */

.chapter-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-elev);
}

.chapter-row {
  display: grid;
  grid-template-columns: 60px 1fr auto auto;
  gap: 24px;
  align-items: center;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s ease;
  position: relative;
}

.chapter-row:last-child { border-bottom: none; }

.chapter-row:hover { background: var(--bg-elev-2); }
.chapter-row.locked { cursor: not-allowed; opacity: 0.5; }
.chapter-row.locked:hover { background: transparent; }

.chapter-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.chapter-name {
  font-weight: 500;
  font-size: 15px;
  margin-bottom: 2px;
}

.chapter-desc {
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.chapter-meta {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  text-align: right;
}

.chapter-arrow {
  font-family: var(--font-mono);
  color: var(--text-dim);
  font-size: 14px;
  transition: transform 0.15s ease, color 0.15s ease;
}

.chapter-row:hover .chapter-arrow {
  color: var(--text);
  transform: translateX(4px);
}

/* ============ Quiz ============ */

.quiz-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 16px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 13px;
}

.progress-bar {
  height: 4px;
  background: var(--bg-elev-2);
  border-radius: 2px;
  overflow: hidden;
  margin: 8px 0 24px;
}

.progress-fill {
  height: 100%;
  background: var(--text);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.qcard {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 40px;
  margin-bottom: 24px;
}

.qhead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.qnum {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.qstem {
  font-size: 19px;
  line-height: 1.6;
  margin: 0 0 28px;
  letter-spacing: 0;
}

.qstem code {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--bg-elev-2);
  padding: 1px 6px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

.qstem-block {
  display: block;
  margin: 14px 0;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--cyan);
  line-height: 1.6;
}

.options {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.option {
  display: flex;
  align-items: stretch;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s ease;
  overflow: hidden;
  text-align: left;
  font-family: var(--font-sans);
  color: var(--text);
  padding: 0;
  width: 100%;
  font-size: 15px;
}

.option:hover:not(:disabled) {
  border-color: var(--border-strong);
  background: var(--bg-elev-2);
}

.option:disabled { cursor: default; }

.opt-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-elev-2);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.opt-text {
  padding: 14px 18px;
  flex: 1;
  display: flex;
  align-items: center;
}

.opt-mark {
  display: flex;
  align-items: center;
  padding: 0 18px;
  font-family: var(--font-mono);
  font-size: 16px;
}

.option.selected { border-color: var(--text); background: var(--bg-elev-2); }
.option.selected .opt-letter { color: var(--text); background: var(--bg-elev-3); }

.option.correct {
  border-color: var(--green-border);
  background: var(--green-bg);
}
.option.correct .opt-letter {
  background: rgba(74, 222, 128, 0.15);
  color: var(--green);
  border-right-color: var(--green-border);
}
.option.correct .opt-mark { color: var(--green); }

.option.wrong {
  border-color: var(--red-border);
  background: var(--red-bg);
}
.option.wrong .opt-letter {
  background: rgba(248, 113, 113, 0.15);
  color: var(--red);
  border-right-color: var(--red-border);
}
.option.wrong .opt-mark { color: var(--red); }

.option.faded { opacity: 0.45; }

.feedback {
  margin-top: 24px;
  padding: 18px 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.feedback.ok { border-color: var(--green-border); background: var(--green-bg); }
.feedback.err { border-color: var(--red-border); background: var(--red-bg); }

.feedback-icon {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 18px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}

.feedback.ok .feedback-icon { background: rgba(74, 222, 128, 0.2); color: var(--green); }
.feedback.err .feedback-icon { background: rgba(248, 113, 113, 0.2); color: var(--red); }

.feedback-text { flex: 1; font-size: 14px; line-height: 1.6; }
.feedback-title { font-weight: 600; margin-bottom: 4px; }
.feedback.ok .feedback-title { color: var(--green); }
.feedback.err .feedback-title { color: var(--red); }

.quiz-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 8px;
}

/* ============ Nav dots ============ */

.qnav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 14px 0;
  margin-bottom: 24px;
}

.qnav-dot {
  width: 28px; height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.qnav-dot:hover { color: var(--text); border-color: var(--border-strong); }
.qnav-dot.current { border-color: var(--text); color: var(--text); background: var(--bg-elev-2); }
.qnav-dot.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
.qnav-dot.wrong { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }

/* ============ Results ============ */

.result-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 40px;
  align-items: center;
  padding: 48px 40px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 32px;
}

.score-big {
  font-family: var(--font-mono);
  font-size: 96px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.04em;
}

.score-big .denom {
  font-size: 32px;
  color: var(--text-dim);
  font-weight: 400;
}

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.result-stat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.result-stat-value {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
}

.review-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-elev);
}

.review-row {
  display: grid;
  grid-template-columns: 48px 1fr auto;
  gap: 18px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}

.review-row:last-child { border-bottom: none; }

.review-marker {
  width: 28px; height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-weight: 700;
  border-radius: 4px;
  font-size: 13px;
}

.review-marker.ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.review-marker.err { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

.review-q {
  font-size: 14px;
  line-height: 1.5;
}

.review-answers {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
}

.review-answers span { color: var(--text-muted); }
.review-answers .you-correct { color: var(--green); }
.review-answers .you-wrong { color: var(--red); }
.review-answers .correct { color: var(--green); }

/* ============ Table ============ */

.table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  font-size: 13px;
}

.table thead {
  background: var(--bg-elev-2);
}

.table th {
  text-align: left;
  padding: 12px 18px;
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
}

.table td {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
}

.table tr:last-child td { border-bottom: none; }
.table tbody tr:hover { background: var(--bg-elev-2); }

.rank-medal {
  display: inline-flex;
  align-items: center;

const { useState: useStateA, useEffect: useEffectA } = React;

/* ============ Helpers ============ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(sec) {
  if (sec == null || isNaN(sec)) return "—";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

const LS_KEYS = {

};

function lsGet(key, fallback) {
  try {

    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

/* ============ Hash routing ============ */
function useHashRoute() {
  const [hash, setHash] = useStateA(window.location.hash || "#/");
  useEffectA(() => {
    const handler = () => setHash(window.location.hash || "#/");
    window.addEventListener("hashchange", handler);
    return () => window.removeEventListener("hashchange", handler);
  }, []);
  const path = hash.replace(/^#/, "") || "/";
  const segments = path.split("/").filter(Boolean);
  return { path, segments };
}

function go(path) {
  window.location.hash = path;

/* ============ QUIZ ============ */
function QuizPage({ chapterId }) {
  const ch = window.CHAPTERS.find(c => c.id === Number(chapterId));
  const bank = window.QUESTIONS_CH6;

  const [quiz] = useStateP(() => {
    const shuffledQs = shuffle(bank);
    return shuffledQs.map(q => ({ ...q, shuffledOptions: shuffle(q.options) }));
  });

  const [idx, setIdx]         = useStateP(0);
  const [answers, setAnswers] = useStateP({});
  const [startTime]           = useStateP(() => Date.now());
  const [timeLeft, setTimeLeft] = useStateP(15 * 60);
  const submitted = useRef(false);

  function submitQuiz() {
    if (submitted.current) return;
    submitted.current = true;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const correctCount = quiz.filter(q => answers[q.id] === q.answer).length;
    const score = Math.round(correctCount / quiz.length * 100);
    const result = {
      chapter: Number(chapterId),
      chapterTitle: ch?.title || "",
      score,
      correctCount,
      total: quiz.length,
      timeSpent: elapsed,
      date: new Date().toLocaleString("zh-TW", { hour12: false }).replace(/\//g, "/"),
      details: quiz.map(q => ({
        id: q.id,
        stem: q.stem,
        userAnswer: answers[q.id] ?? null,
        correctAnswer: q.answer,
        options: q.shuffledOptions,
        hint: q.hint,
      })),
    };
    const history = lsGet(LS_KEYS.history, []);
    history.push(result);
    lsSet(LS_KEYS.history, history);
    window.LAST_RESULT = result;
    go("/result");
  }

  useEffectP(() => {
    const t = setInterval(() => {
      setTimeLeft(s => {
        if (s <= 1) { clearInterval(t); submitQuiz(); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, []);

  const total = quiz.length;
  const current = quiz[idx];
  const selectedKey = answers[current.id];
  const isAnswered = selectedKey != null;
  const isCorrect = isAnswered && selectedKey === current.answer;

  function selectOption(key) {
    if (isAnswered) return;
    setAnswers(a => ({ ...a, [current.id]: key }));
  }

  function gotoNext() {
    if (idx < total - 1) setIdx(idx + 1);
    else submitQuiz();
  }
  function gotoPrev() { if (idx > 0) setIdx(idx - 1); }

  return (
    <Page>
      <div className="quiz-top">
        <div>
          <span className="dim">ch.{String(chapterId).padStart(2, "0")}</span>
          <span className="dim"> / </span>
          <span>{ch?.title}</span>
        </div>
        <div style={{ display: "flex", gap: 24, alignItems: "center" }}>
          <span>
            <span className="dim">題目 </span>
            <span style={{ fontWeight: 600 }}>{String(idx + 1).padStart(2, "0")}</span>
            <span className="dim"> / {total}</span>
          </span>
          <span>
            <span className="dim">⏱ </span>
            <span className={timeLeft < 60 ? "red" : ""} style={{ fontWeight: 600 }}>{formatTime(timeLeft)}</span>
          </span>
          <button className="btn btn-sm btn-ghost" onClick={() => { if (confirm("確定要結束作答嗎？")) submitQuiz(); }}>
            交卷
          </button>
        </div>
      </div>

      <div className="progress-bar">
        <div className="progress-fill" style={{ width: `${(idx + 1) / total * 100}%` }}></div>
      </div>

      <div className="qnav">
        {quiz.map((q, i) => {
          const a = answers[q.id];
          let cls = "qnav-dot";
          if (i === idx) cls += " current";
          else if (a != null) cls += a === q.answer ? " correct" : " wrong";
          return (
            <span key={q.id} className={cls} onClick={() => setIdx(i)}>
              {String(i + 1).padStart(2, "0")}
            </span>
          );
        })}
      </div>

      <div className="qcard">
        <div className="qhead">
          <span className="qnum">
            QUESTION {String(idx + 1).padStart(2, "0")} · {current.id}
            {current.custom && <span className="tag tag-amber" style={{ marginLeft: 8 }}>本組設計</span>}
          </span>
          {isAnswered && (
            isCorrect
              ? <span className="tag tag-green">✓ 正確</span>
              : <span className="tag tag-red">✗ 錯誤</span>
          )}
        </div>

        <div className="qstem">
          {current.stem}
          {current.block && <code className="qstem-block">{current.block}</code>}
        </div>

        <div className="options">
          {current.shuffledOptions.map(opt => {
            const isSelected = selectedKey === opt.key;
            const isAnswer   = opt.key === current.answer;
            let cls = "option";
            if (isAnswered) {
              if (isAnswer)      cls += " correct";
              else if (isSelected) cls += " wrong";
              else                 cls += " faded";
            } else if (isSelected) cls += " selected";

            const mark = isAnswered ? (isAnswer ? "✓" : (isSelected ? "✗" : "")) : "";
            return (
              <button key={opt.key} className={cls} onClick={() => selectOption(opt.key)} disabled={isAnswered}>
                <span className="opt-letter">{opt.key}</span>
                <span className="opt-text">{opt.text}</span>
                <span className="opt-mark">{mark}</span>
              </button>
            );
          })}
        </div>

        {isAnswered && (
          <div className={"feedback " + (isCorrect ? "ok" : "err")}>
            <div className="feedback-icon">{isCorrect ? "✓" : "✗"}</div>
            <div className="feedback-text">
              <div className="feedback-title">
                {isCorrect ? "答對了！" : `答錯，正解為 ${current.answer}`}
              </div>
              <div className="muted">{current.hint}</div>
            </div>
          </div>
        )}
      </div>

      <div className="quiz-actions">
        <button className="btn" onClick={gotoPrev} disabled={idx === 0}>← 上一題</button>
        <span className="dim mono" style={{ fontSize: 12 }}>
          {isAnswered ? "已作答" : "請選擇答案"}
        </span>
        <button className="btn btn-primary" onClick={gotoNext} disabled={!isAnswered}>
          {idx === total - 1 ? "完成測驗 →" : "下一題 →"}
        </button>
      </div>
    </Page>
  );
}

        wrongMap.set(d.id, { ...d, chapter: h.chapter, chapterTitle: h.chapterTitle, date: h.date });
      } else {
        wrongMap.delete(d.id);
      }
    });
  });
  const wrongList = [...wrongMap.values()];

  return (
    <Page>
      <div style={{ padding: "12px 0 32px" }}>
        <div className="hero-prompt">$ grep -r "wrong" ./history/</div>
        <h1 className="hero-title" style={{ fontSize: 38 }}>錯題複習</h1>
        <p className="hero-sub">系統自動從歷史紀錄中蒐集你答錯的題目。答對後會自動從清單中移除。</p>
      </div>

      {wrongList.length === 0 ? (
        <Empty>
          ✓ 目前沒有錯題！<br/><br/>
          <button className="btn" onClick={() => go("/chapter/6")}>開始一次測驗 →</button>
        </Empty>
      ) : (
        <>
          <div className="notice" style={{ marginBottom: 16 }}>
            // 共 {wrongList.length} 題待複習
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {wrongList.map((d, i) => {
              const userOpt    = d.options.find(o => o.key === d.userAnswer);
              const correctOpt = d.options.find(o => o.key === d.correctAnswer);
              return (
                <div key={d.id} className="qcard" style={{ padding: "24px 28px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                    <span className="mono dim" style={{ fontSize: 12 }}>
                      Q{String(i + 1).padStart(2, "0")} · ch.{String(d.chapter).padStart(2, "0")} {d.chapterTitle}
                    </span>
                    <span className="tag tag-red">需複習</span>
                  </div>
                  <div style={{ fontSize: 16, marginBottom: 14, lineHeight: 1.6 }}>{d.stem}</div>
                  <div className="mono" style={{ fontSize: 13, color: "var(--text-muted)", lineHeight: 1.9 }}>
                    <div>你選的：<span className="red">({d.userAnswer || "—"}) {userOpt?.text || "未作答"}</span></div>
                    <div>正解：<span className="green">({d.correctAnswer}) {correctOpt?.text}</span></div>
                  </div>
                  {d.hint && (
                    <div style={{ marginTop: 14, padding: "12px 14px", background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 4, fontSize: 13, color: "var(--text-muted)" }}>
                      <span className="dim mono" style={{ fontSize: 11 }}># 解析　</span>{d.hint}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </Page>
  );
}

/* ============ ADMIN ============ */
function AdminPage() {
  const [search, setSearch] = useStateP("");
  const [editing, setEditing] = useStateP(null);

  const list = window.QUESTIONS_CH6.filter(q =>
    !search || q.stem.includes(search) || q.id.includes(search)
  );

  return (
    <Page>
      <div style={{ padding: "12px 0 24px" }}>
        <div className="hero-prompt">$ python manage.py runserver  ─  /admin/</div>
        <h1 className="hero-title" style={{ fontSize: 38 }}>題庫管理</h1>
        <p className="hero-sub">Django Admin 介面預覽 — 管理者可在此新增 / 修改 / 刪除題目。</p>
      </div>

      <StatsStrip items={[
        { label: "題庫總數", value: window.QUESTIONS_CH6.length, unit: "題" },
        { label: "已啟用",   value: window.QUESTIONS_CH6.length, unit: "題" },
        { label: "本組設計", value: window.QUESTIONS_CH6.filter(q => q.custom).length, unit: "題" },
        { label: "章節",     value: "ch.06" },
      ]}/>

      <div className="section-head" style={{ marginTop: 40, marginBottom: 16 }}>
        <h3 className="section-title">Question_set / 題目列表</h3>
        <div className="admin-toolbar" style={{ margin: 0 }}>
          <input
            className="input admin-search"
            placeholder="搜尋題目..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <button className="btn btn-primary btn-sm">+ 新增題目</button>
        </div>
      </div>

      <table className="table">
        <thead>
          <tr>
            <th>ID</th>
            <th style={{ width: "55%" }}>題幹</th>
            <th>選項數</th>
            <th>正解</th>
            <th>來源</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          {list.map(q => (
            <tr key={q.id}>
              <td className="dim">{q.id}</td>
              <td style={{ fontFamily: "var(--font-sans)", whiteSpace: "normal", maxWidth: 0 }}>
                <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{q.stem}</div>
              </td>
              <td>{q.options.length}</td>
              <td><span className="tag tag-green">{q.answer}</span></td>
              <td className="dim">{q.custom ? <span className="tag tag-amber">本組設計</span> : "課程題庫"}</td>
              <td>
                <button className="btn btn-sm btn-ghost" onClick={() => setEditing(q)}>編輯</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>

      <div style={{ marginTop: 24 }}>
        <div className="notice">
          // 此為 Django Admin 介面之 mockup；實際系統將使用 Django 內建後台，免額外撰寫 CRUD 介面。
        </div>
      </div>

      {editing && (
        <div className="modal-backdrop" onClick={() => setEditing(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="panel-header">
              <span className="mono">edit_question / {editing.id}</span>
              <span className="dim mono" style={{ cursor: "pointer" }} onClick={() => setEditing(null)}>✕</span>
            </div>
            <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 16 }}>
              <div>
                <div className="mono dim" style={{ fontSize: 11, marginBottom: 6, textTransform: "uppercase" }}>題幹</div>
                <textarea className="input" defaultValue={editing.stem} rows={3} style={{ fontFamily: "var(--font-sans)", resize: "vertical" }}/>
              </div>
              <div>
                <div className="mono dim" style={{ fontSize: 11, marginBottom: 6, textTransform: "uppercase" }}>選項</div>
                {editing.options.map(o => (
                  <div key={o.key} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
                    <span className="mono" style={{ width: 24, color: o.key === editing.answer ? "var(--green)" : "var(--text-dim)" }}>{o.key}</span>
                    <input className="input" defaultValue={o.text} style={{ fontFamily: "var(--font-sans)" }}/>
                    <input type="radio" name="ans" defaultChecked={o.key === editing.answer}/>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
                <button className="btn btn-ghost" onClick={() => setEditing(null)}>取消</button>
                <button className="btn btn-primary" onClick={() => { alert("(mock) 已儲存"); setEditing(null); }}>儲存</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

/* ============ APP ROOT ============ */
function App() {
  const route = useHashRoute();
  const { segments } = route;

  let view;
  if (segments.length === 0)                         view = <HomePage/>;
  else if (segments[0] === "chapters")               view = <ChaptersPage/>;
  else if (segments[0] === "chapter" && segments[1]) view = <ChapterIntroPage chapterId={segments[1]}/>;
  else if (segments[0] === "quiz"    && segments[1]) view = <QuizPage key={`quiz-${segments[1]}-${Date.now()}`} chapterId={segments[1]}/>;
  else if (segments[0] === "result")                 view = <ResultPage/>;
  else if (segments[0] === "history")                view = <HistoryPage/>;
  else if (segments[0] === "leaderboard")            view = <LeaderboardPage/>;
  else if (segments[0] === "review")                 view = <ReviewPage/>;
  else if (segments[0] === "admin")                  view = <AdminPage/>;
  else                                               view = <HomePage/>;

  return (
    <div className="app">
      <Header route={route}/>
      <main>{view}</main>
      <Footer/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
